.2" y="246" fill="#8b949e" font-weight="400">line 26:6  </tspan><tspan x="254.0" y="246" fill="#c9d1d9" font-weight="400">RIGHT-TO-LEFT OVERRIDE — text you read ≠ text the agent reads</tspan><tspan x="20.0" y="288" fill="#f0f6fc" font-weight="600">8 findings </tspan><tspan x="105.8" y="288" fill="#8b949e" font-weight="400">(1 critical, 5 high, 2 medium)</tspan><tspan x="339.8" y="288" fill="#f0f6fc" font-weight="600"> in 1 file</tspan>
