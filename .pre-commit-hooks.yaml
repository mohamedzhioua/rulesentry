- id: rulesentry
  name: rulesentry
  description: "Catch hidden / invisible-unicode instructions in AI-agent config & skill files"
  entry: rulesentry scan
  language: node
  # Run once for the whole repo (rulesentry does its own discovery) rather than
  # per-file, so it also catches files the commit did not touch.
  pass_filenames: false
  always_run: true
  types: [text]

- id: rulesentry-fix
  name: rulesentry fix
  description: "Strip invisible/deceptive characters from AI-agent config & skill files (auto-fix)"
  entry: rulesentry fix --write
  language: node
  pass_filenames: false
  always_run: true
  types: [text]
