name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  dogfood:
    # rulesentry scans itself: the clean fixture must pass, the malicious one must fail.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Clean fixture must pass
        run: node dist/cli.js scan examples/clean-CLAUDE.md
      - name: Malicious fixture must be caught (expect exit 1)
        run: |
          if node dist/cli.js scan examples/malicious-CLAUDE.md --no-color; then
            echo "::error::rulesentry failed to catch the malicious fixture"
            exit 1
          else
            echo "malicious fixture correctly flagged"
          fi
      - name: Repo agent files clean at medium+
        run: node dist/cli.js scan --min-severity medium --fail-on medium
